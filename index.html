<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA STUDIO Hero Update</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Segoe UI",sans-serif;
    background:linear-gradient(180deg,#fff,#faf7ff);
    color:#191919;
}
.hero{
    max-width:1280px;
    margin:0 auto;
    min-height:100vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:80px;
    padding:70px 40px;
}
.eyebrow{
    color:#7b61ff;
    font-weight:700;
    letter-spacing:.08em;
    margin-bottom:18px;
}
.hero h1{
    font-size:78px;
    font-weight:700;
    line-height:1.18;
    letter-spacing:-0.04em;
}
.hero h1 .nova{
    display:block;
    font-size:30px;
    color:#7b61ff;
    margin-bottom:18px;
    font-weight:800;
    letter-spacing:.02em;
}
.desc{
    margin-top:34px;
    font-size:20px;
    color:#666;
    line-height:1.8;
    max-width:620px;
}
.btns{
    display:flex;
    gap:16px;
    margin-top:40px;
}
.btn{
    padding:16px 28px;
    border-radius:14px;
    text-decoration:none;
    font-weight:700;
}
.primary{background:#7b61ff;color:#fff}
.secondary{border:1px solid #ddd;color:#222}
.mockup{
    height:640px;
    border-radius:28px;
    background:linear-gradient(135deg,#f7f2ff,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#aaa;
    font-size:22px;
}
</style>
</head>
<body>
<section class="hero">
<div>
<div class="eyebrow">MARKETING & DESIGN PARTNER</div>

<h1>
<span class="nova">NOVA STUDIO</span>
브랜드의 성장을<br>
설계하는<br>
마케팅 파트너
</h1>

<p class="desc">
마케팅 전략부터 콘텐츠 제작, 디자인, 광고 운영, 홈페이지 제작까지.
브랜드의 성장을 위한 모든 실행을 NOVA STUDIO가 함께합니다.
</p>

<div class="btns">
<a href="#" class="btn primary">포트폴리오 보기</a>
<a href="#" class="btn secondary">상담 문의하기</a>
</div>
</div>

<div class="mockup">
실제 노트북·태블릿 목업 자리
</div>
</section>
</body>
</html>
